name: BOREAL
options:
  bundleIdPrefix: com.daniel.boreal
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1"            # iPhone only
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: NO

targets:
  BOREAL:
    type: application
    platform: iOS
    sources:
      # Active app, laid out by function (form follows function). The dead
      # 64-frame-GIF tree was removed; BorealKernel.h and the bridging header
      # are headers (found via HEADER_SEARCH_PATHS), not sources.
      - path: BOREAL/App
      - path: BOREAL/Capture
      - path: BOREAL/Pipeline
      - path: BOREAL/Review
      - path: BOREAL/Shared
    resources:
      - path: BOREAL/Assets.xcassets
    info:
      path: BOREAL/Info.plist
      properties:
        CFBundleDisplayName: BOREAL
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchBackground   # black → no white flash before the app
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "BOREAL captures RAW frames to build its 16×16-seeded GIF."
        UIRequiredDeviceCapabilities:
          - arm64
          - metal
          - still-camera
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daniel.boreal
        INFOPLIST_FILE: BOREAL/Info.plist
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
        MTL_FAST_MATH: YES
        # Zig kernel integration. The pre-build phase below produces
        # libborealkernel.a per (platform, arch) under
        #   zig/borealkernel/zig-out/<triple>/lib/
        # The bridging header exposes BorealKernel.h to Swift.
        SWIFT_OBJC_BRIDGING_HEADER: BOREAL/BOREAL-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/BOREAL
        # Per-SDK library search paths so the simulator build doesn't
        # accidentally pick up the device's aarch64-ios .a (which would
        # surface as a misleading "not 8-byte aligned" linker error).
        "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]":
          - $(SRCROOT)/zig/borealkernel/zig-out/aarch64-ios/lib
        "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]":
          - $(SRCROOT)/zig/borealkernel/zig-out/aarch64-ios-simulator/lib
        OTHER_LDFLAGS:
          - -lborealkernel
    preBuildScripts:
      - name: "Build Zig kernel (libborealkernel.a)"
        script: |
          "${SRCROOT}/scripts/build-zig.sh"
        # Declared inputs: every .zig source that affects the .a output.
        # The xcfilelist is human-maintained; Xcode uses it to decide
        # whether the pre-build phase needs to re-run.
        inputFiles:
          - $(SRCROOT)/zig/borealkernel/build.zig
          - $(SRCROOT)/zig/borealkernel/build.zig.zon
        inputFileLists:
          - $(SRCROOT)/scripts/zig-source-inputs.xcfilelist
        outputFiles:
          - "$(SRCROOT)/zig/borealkernel/zig-out/$(EFFECTIVE_PLATFORM_NAME:c=)/lib/libborealkernel.a"
        # With proper input declarations Xcode can skip this phase when
        # nothing changed. Zig's own caching is still the second line of
        # defense if the input list is stale.
        basedOnDependencyAnalysis: true
