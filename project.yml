name: BOREAL
options:
  bundleIdPrefix: com.daniel.boreal
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1"            # iPhone only
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: NO

targets:
  BOREAL:
    type: application
    platform: iOS
    sources:
      # Active app, laid out by function (form follows function). The kernel
      # core is pure Swift under BOREAL/Kernels (enum BorealKernels).
      - path: BOREAL/App
      - path: BOREAL/Capture
      - path: BOREAL/Kernels
      - path: BOREAL/Pipeline
      - path: BOREAL/Review
      - path: BOREAL/Shared
    resources:
      - path: BOREAL/Assets.xcassets
    info:
      path: BOREAL/Info.plist
      properties:
        CFBundleDisplayName: BOREAL
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchBackground   # black → no white flash before the app
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "BOREAL captures RAW frames to build its 16×16-seeded GIF."
        UIRequiredDeviceCapabilities:
          - arm64
          - metal
          - still-camera
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daniel.boreal
        INFOPLIST_FILE: BOREAL/Info.plist
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
        MTL_FAST_MATH: YES
        # The kernel core is pure Swift (BOREAL/Kernels/, enum BorealKernels)
        # — Phase 5 migration complete; the Zig tree and its link/pre-build
        # wiring are gone.
